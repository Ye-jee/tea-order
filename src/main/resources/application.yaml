spring:
  application:
    name: teaorder

  datasource:
    url: jdbc:h2:mem:teaorder
    driver-class-name: org.h2.Driver
    username: user
    password: pwd

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create

    defer-datasource-initialization: true

    show-sql: true

    properties:
      hibernate:
        format_sql: true
